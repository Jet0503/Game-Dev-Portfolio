<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Penalty Shootout</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #1f3b2d;
  color: white;
  min-height: 100vh;
  padding: 30px;
}

h1 {
  font-size: 50px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  margin-top: 30px;
}

.card {
  background: #294d3a;
  border-radius: 25px;
  padding: 25px;
  border: 2px solid #3d6a52;
}

textarea {
  width: 100%;
  height: 300px;
  background: black;
  color: #00ff88;
  border-radius: 15px;
  padding: 15px;
  margin-top: 20px;
}

button {
  margin-top: 20px;
  background: #4dff88;
  border: none;
  padding: 14px 25px;
  border-radius: 15px;
  font-weight: bold;
  cursor: pointer;
}

#stadium {
  position: relative;
  height: 420px;
  background: linear-gradient(to bottom, #2e8b57, #1f5c3f);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 20px;
}

.goal {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 100px;
}

#goalkeeper {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 55px;
}

#ball {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 45px;
  transition: all 0.8s ease;
}

#player {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
}

#score {
  margin-top: 20px;
  font-size: 30px;
}

.complete {
  display: none;
  margin-top: 30px;
  background: #4dff88;
  color: black;
  padding: 25px;
  border-radius: 25px;
  text-align: center;
}

</style>
</head>

<body>

<h1>JAVA PENALTY SHOOTOUT</h1>

<div class="container">

<div class="card">
<h2 id="levelTitle"></h2>
<p id="instruction"></p>

<textarea id="codeBox"></textarea>
<button onclick="checkCode()">Compile & Shoot</button>

<div id="message"></div>
</div>

<div class="card">
<h2>Penalty Arena</h2>

<div id="stadium">
  <div class="goal">🥅</div>
  <div id="goalkeeper">🧤</div>
  <div id="ball">⚽</div>
  <div id="player">🧑🏾‍💻</div>
</div>

<div id="score">Goals: 0</div>
</div>

</div>

<div class="complete" id="completeBox">
<h2>CHAMPION 🎉</h2>
</div>

<script>
const levels = [
{ title: "Step 1", instruction: "Create class Main", answer: "class Main" },
{ title: "Step 2", instruction: "Add main method", answer: "main" },
{ title: "Step 3", instruction: "Print Hello World", answer: "System.out.println" }
];

let current = 0;
let goals = 0;

// -------- LEVEL UI ----------
function loadLevel() {
document.getElementById("levelTitle").innerText = levels[current].title;
document.getElementById("instruction").innerText = levels[current].instruction;
document.getElementById("codeBox").value = "";
}
loadLevel();

// -------- GOALKEEPER MOVEMENT ----------
let keeper = document.getElementById("goalkeeper");
let dir = 1;
let pos = 40;

setInterval(() => {
pos += dir * 2;

if (pos > 70) dir = -1;
if (pos < 30) dir = 1;

keeper.style.left = pos + "%";
}, 50);

// -------- ANIMATIONS ----------
function shoot(goal) {
const ball = document.getElementById("ball");

if (goal) {
ball.style.left = "70%";
ball.style.bottom = "300px";
} else {
ball.style.left = "30%";
ball.style.bottom = "200px";
}

setTimeout(() => {
ball.style.left = "50%";
ball.style.bottom = "90px";
}, 800);
}

// -------- CHECK CODE ----------
function checkCode() {
const code = document.getElementById("codeBox").value;
const msg = document.getElementById("message");

if (code.includes(levels[current].answer)) {
msg.innerHTML = "⚽ GOAL!";
goals++;
document.getElementById("score").innerText = "Goals: " + goals;

shoot(true);

current++;

if (current < levels.length) {
setTimeout(loadLevel, 1000);
} else {
setTimeout(() => {
document.getElementById("completeBox").style.display = "block";
}, 1000);
}

} else {
msg.innerHTML = "❌ MISS!";
shoot(false);
}
}
</script>

</body>
</html>
